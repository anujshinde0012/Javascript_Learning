<!DOCTYPE html>
<html>

<head>
    <title> Arrays </title>
</head>

<body>
    <script>
        const myFirstArray = [10, 20, 30];
        console.log(myFirstArray);

        console.log(myFirstArray[1]); // Position in the array
        myFirstArray[0] = 99;
        console.log(myFirstArray[0]);

        const mySecondArray = [100, 'Anuj', { item: "Socks" }, [1, 34], true];
        console.log(typeof [1, 2]); // Will tell the type of an array.
        console.log(Array.isArray([1, 2])); // Will tell whether the given is array or not(true or false).

        console.log(myFirstArray.length);
        myFirstArray.put(230);
        console.log(myFirstArray);

        myFirstArray.splice(0, 1);
        console.log(myFirstArray);

        const arr1 = [1, 2, 3]; // Reference
        const arr2 = arr1.slice();
        arr2.push(4);
        console.log(arr1);
        console.log(arr2);

        const [firstValue, secondValue] = [1, 2, 3];
    </script>
</body>

</html>
