<html>
    <head>
        <title>
            Boolean
        </title>
    </head>
    <body>
        <script>
            console.log(2 > 5); // False will be displayed in the console.
            console.log(2 < 5); // True will be displayed in the console.

            console.log(5 == '5.00'); // Will show true because it converts both in same type and then compare.
            console.log(5 === '5.00'); // Will show false, the correct comparison result.

            if(false)
            {
                console.log("Good Morning");
            }
            else
            {
                console.log("Bad Morning");
            }

            if (36 >= 16)
            {
                console.log("Congratulations, you are completely eligible to drive.");
            }
            else
            {
                console.log("Sorry, you are not eligible to drive.")
            }

        </script>
    </body>
</html>
