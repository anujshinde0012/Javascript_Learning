<!DOCTYPE html>
<html>

<head>
    <title>Rock Paper Scissors</title>
    <style>
        body {
            background-color: rgb(25, 25, 25);
            color: white;
            font-family: Arial;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
            margin-top: 30px;
        }

        .move-icon {
            height: 100px;
        }

        .move-button {
            background-color: transparent;
            border: 3px solid white;
            width: 120px;
            height: 120px;
            border-radius: 60px;

            cursor: pointer;
        }

        .result {
            font-size: 25px;
            font-weight: bold;

        }

        .resetButton {
            background-color: white;
            border: none;
            font-size: 15px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button" onclick="playGame('rock')">
        <img src="Images/rock-emoji.png" class="move-icon">
    </button>

    <button class="move-button" onclick="playGame('paper')">
        <img src="Images/paper-emoji.png" class="move-icon">
    </button>

    <button class="move-button" onclick="playGame('scissors')">
        <img src="Images/scissors-emoji.png" class="move-icon">
    </button>

    <p class="result"></p>
    <p class="moves"></p>
    <p class="score"></p>

    <button class="resetButton" onclick="resetScore()">Reset Score</button>

    <script>
        const score = { wins: 0, losses: 0, ties: 0 };

        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            let result = '';

            if (playerMove === computerMove) {
                result = 'Tie.';
                score.ties++;
            } else if (
                (playerMove === 'rock' && computerMove === 'scissors') ||
                (playerMove === 'paper' && computerMove === 'rock') ||
                (playerMove === 'scissors' && computerMove === 'paper')
            ) {
                result = 'You win!';
                score.wins++;
            } else {
                result = 'You lost.';
                score.losses++;
            }

            document.querySelector('.result').innerHTML = result;
            document.querySelector('.moves').innerHTML = `
        You 
        <img src="Images/${playerMove}-emoji.png" class="move-icon">
        <img src="Images/${computerMove}-emoji.png" class="move-icon">
        Computer
      `;
            updateScore();
        }

        function pickComputerMove() {
            const randomNum = Math.random();
            if (randomNum < 1 / 3) return 'rock';
            else if (randomNum < 2 / 3) return 'paper';
            else return 'scissors';
        }

        function updateScore() {
            document.querySelector('.score').innerHTML = `
        Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}
      `;
        }

        function resetScore() {
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            updateScore();
            alert('Scores have been reset!');
        }

        updateScore();
    </script>
</body>

</html>
