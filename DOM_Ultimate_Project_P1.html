    <p> Orders over $40 = FREE shipping. </p>

    <input placeholder="Cost of order" class="userInput calButton" onkeydown="console.log(event.key); // Prints the key typed in the console
        if(event.key === 'Enter')
        {
            calculate();
        }">

    <button onclick="calculate()" class="calStyle">
        Calculate </button>

    <p class="totalCost"></p>

    Rock();

    paper();

    scissors();
    ">

    score.wins = 0;
