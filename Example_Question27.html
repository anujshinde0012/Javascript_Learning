<!DOCTYPE html>
<html>

        <title>

        </title>

    <body>
        <script>
            function greet(name)
            {
                if(!name)
                {
                   console.log("Hi there!"); 
                }
                else
                {
                console.log(`Hello ${name}.`);
                }
            }

            greet("Anuj");
            greet("Bhumi");
            greet("Simon");
            greet();

        </script>
    </body>
