    <body>
        <script>
            function convertToFarheneit(celcius)
            {
                farheneit = (celcius * 9/5) + 32;
                return farheneit;
            }

            const result = convertToFarheneit(25);
            console.log(`convertToFarheneit(25) => ${result}`);
        </script>
    </body>
