<!DOCTYPE html>

        <title>
            Example Question 29
        </title>
    </head>
    <body>
        <script>
            function convertToCelcius(farheneit)
            {
                celcius = (farheneit - 32) * 5/9;
                return celcius;
            }

            const result = convertToCelcius(86);
            console.log(`convertToCelcius(86) => ${result}`);
        </script>
    </body>
</html>
