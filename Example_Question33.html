<html>
    <head>
        <title>
            Example Question 33
        </title>
    </head>
    <body>
        <button onclick="updateStatement('Heads')"> Heads </button>
        <button onclick="updateStatement('Tails')"> Tails </button>

        <p class="result"></p>
        <script>
            function updateStatement(choice)
            {
                document.querySelector('.result')
                    .innerHTML = `You chose: ${choice}`;
            }
        </script>
    </body>
</html>
