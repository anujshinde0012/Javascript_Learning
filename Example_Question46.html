    <body>
        <script>
            function countPositive(nums) {
                let arr = [];
                let count = 0;

                for(let i = 0; i < nums.length; i++) {
                    if (nums[i] >= 0) {
                        count++;
                        arr.push(nums[i]);
                    }
                }
                console.log(arr);
                console.log(count);
            }

            countPositive([1, -3, 5]);
            countPositive([-2, 3, -5, 7, 10]);
        </script>
    </body>
