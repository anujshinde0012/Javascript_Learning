<body>
    <script>
        let i = 1;
/*Loop Variable*/while (i <= 5)/*Loop Condition*/ {
            console.log(i);
            i = i + 1; /*Increment Step*/
        }

        for (let i = 1; i <= 5; i++) {
            console.log(i);
        }
        // A FOR-lOOP is a shorter version of a WHILE-LOOP.

        let randomNumber = 0;

        while (randomNumber < 0.5) {
            randomNumber = Math.random();
        }
        console.log(randomNumber);

        const todoList = ['make dinner', 'wash dishes', 'watch lectures'];

        for (let i = 0; i < todoList.length; i++) {
            const value = todoList[i];
            console.log(value);
        }

        const arrayNum = [1, 1, 3];
        let total = 0;
        for (let i = 0; i < arrayNum.length; i++) {
            const add = arrayNum[i];
            total += add;
        }
        console.log(total);

        let double = [];
        for (let i = 0; i < arrayNum.length; i++) {
            const num = arrayNum[i];
            double.push(num * 2);
        }
        console.log(double);

        for (let i = 1; i <= 10; i++) {
            if (i % 3 == 0) {
                continue;
            }
            console.log(i);
            if (i == 8) {
                break;
            }
        }

        let n = 1;
        while (n <= 10) {
            if (i % 3 == 0) {  
                i++;
                continue;
            }
            console.log(n);
            i++;
        }

        function doubleArray(nums) {
            const numsDoubled = [];
            for (let i = 0; i < nums.length; i++) {
                const num = nums[i];
                if (num == 0) {
                    return numsDoubled;
                }
                numsDoubled.push(num * 2);
            }
            // console.log(numsDoubled);
            return numsDoubled;
        }
        console.log(doubleArray([1, 1, 3]));
        console.log(doubleArray([2, 2, 0, 5]));

    </script>
