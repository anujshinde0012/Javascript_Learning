<html>

<head>
    <title>
        Rock Paper Scissors
    </title>

    <style>
        .b1 {
            background-color: green;
            border-radius: 25px;
            border-color: black;
        }

        .b2 {
            background-color: red;
            border-radius: 25px;
            border-color: black;
        }

        .b3 {
            background-color: orange;
            border-radius: 25px;
            border-color: black;
        }
    </style>
</head>

<body>
    <p>
        Rock Paper Scissors
    </p>

    <button class="b1" onclick="
    Rock();
        
        let result1 = '';
        if(move1 == 'rock')
        {
            result1 = 'Tie.';
        }
        else if (move1 == 'paper')
        {
            result1 = 'You lost.';
        }
        else if (move1 == 'scissors')
        {
            result1 = 'You win.';
        }
        alert(`You picked rock. Computer picked ${move1}. ${result1}`);">
        Rock
    </button>

    <button class="b2" onclick="
    paper();
        
        let result2 = '';
        if(move2 == 'rock')
        {
            result2 = 'You win.';
        }
        else if (move2 == 'paper')
        {
            result2 = 'Tie.';
        }
        else if (move2 == 'scissors')
        {
            result2 = 'You lost.';
        }
        alert(`You picked paper. Computer picked ${move2}. ${result2}`);">
        Paper
    </button>

    <button class="b3" onclick="
    scissors();
        
        let result23 = '';
        if(move23 == 'rock')
        {
            result23 = 'You lost.';
        }
        else if (move23 == 'paper')
        {
            result23 = 'You win.';
        }
        else if (move23 == 'scissors')
        {
            result23 = 'Tie.';
        }
        alert(`You picked scissors. Computer picked ${move23}. ${result23}`);">
        Scissors
    </button>

    <script>
        let move23 = '';
        let move2 = '';
        let move1 = '';

        function scissors() {
            const num23 = Math.random();


            if (num23 >= 0 && num23 < 1 / 3) {
                move23 = 'rock';
            }
            else if (num23 >= 1 / 3 && num23 < 2 / 3) {
                move23 = 'paper';
            }
            else if (num23 >= 2 / 3 && num23 < 1) {
                move23 = 'scissors';
            }
            console.log(move23);
        }

        function paper() {
            const num2 = Math.random();


            if (num2 >= 0 && num2 < 1 / 3) {
                move2 = 'rock';
            }
            else if (num2 >= 1 / 3 && num2 < 2 / 3) {
                move2 = 'paper';
            }
            else if (num2 >= 2 / 3 && num2 < 1) {
                move2 = 'scissors';
            }
            console.log(move2);
        }

        function Rock() {
            const num1 = Math.random();


            if (num1 >= 0 && num1 < 1 / 3) {
                move1 = 'rock';
            }
            else if (num1 >= 1 / 3 && num1 < 2 / 3) {
                move1 = 'paper';
            }
            else if (num1 >= 2 / 3 && num1 < 1) {
                move1 = 'scissors';
            }
            console.log(move1);
        }
    </script>
</body>

</html>
