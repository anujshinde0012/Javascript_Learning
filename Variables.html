<html>
    <head>
        <title>
            Variables
        </title>
    </head>
    <body>
        <script>
            let var1 = 49; //Assigning a value to a variable.
            console.log(var1); 
            // Here, the value of variable var1 will be already printed in console of this webpage.

            let calc = 2 + 2;
            console.log(calc);

            let a = calc + 5;
            console.log(a);

            let str = 'Anuj bhumi';
            console.log(str); console.log('Hello'); // This is allowed. Not neccesary to use ";" for the last console.

            var1 = 45;
            console.log(var1); // Re-assigning a value to a variable.

            const var2 = 5;
            console.log(var2);
            // The above constant var2 cannot be changed or re-assigned just like the variable.

            console.log(typeof str);
            console.log(typeof var1);
        </script>
    </body>
</html>
