<!DOCTYPE html>
<html>

    <head>

        <title> 
			CSS HTML Webpage 
		</title>

        <!-- This is the "CSS" part of the webpage that helps in changing the appearance of the website. -->
        <!-- button, p: CSS Selector, Inside the curly brackets: CSS Styles -->
        <style>
            .black-button /*CSS Selector*/
            { /*CSS Styles*/
            /*CSS Property*/background-color: black; /*CSS Values*/
            /*CSS Property*/color: bisque; /*CSS Values*/
            /*CSS Property*/border: none; /*CSS Values*/
            }
        
            button /*CSS Selector*/
            { /*CSS Styles*/
            /*CSS Property*/background-color: royalblue; /*CSS Values*/
            /*CSS Property*/color: bisque; /*CSS Values*/
            /*CSS Property*/border: none; /*CSS Values*/
            }


            p /*CSS Selector*/
            { /*CSS Styles*/
            /*CSS Property*/color: wheat; /*CSS Values*/
            /*CSS Property*/background-color: brown; /*CSS Values*/
            }
        </style>

    </head>

    <body>

        <!-- This is the "HTML" part of the webpage that helps in creating the content on the website. -->
        <button 
			title="Hello Bol raha hu na!" 
			class = "black-button" 
			onclick="alert('Hi, My name is Anuj Shinde. How can i help you?');"> 
			HELLO 
		</button>

        <p> 
			This is a pararagh that will tell more about you people, whenever you want or wherever you want. 
		</p>

        <p> 
			This button 
					<button 
						title="Jaldi Ata Hai Ki Nahi??"> 
						COME HERE! 
					</button> 
			will take you to your dreams. 
		</p>
        <!-- This is called as nesting of elements in the html. -->

        <button 
			title="Accha Toh Hum Chalte Hai!" 
			class="black-button"> 
			Bye Bye! 
	    </button>
        <!-- The commenting in the HTML should be done like this, whereas the commenting done in the style part only is done in CSS.-->

		<script>

			// We can comment like this in the javascript codings.
			alert("Welcome To The Web Page!");

			console.log(2 + 2);
			console.log("Hello, Welcome to the console section.");
			// console.log() let us print any operation, string, etc in the conasole section of the webpage.

		</script>	

    </body>

</html>
